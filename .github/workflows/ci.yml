name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Per-rule lint severity is set by `[workspace.lints]` in the root
  # Cargo.toml. We intentionally do not set `RUSTFLAGS=-Dwarnings`
  # here — that would override `missing_docs = "warn"` and turn the
  # 3,335 known warnings into errors. Things we *do* want as errors
  # (`unsafe_code`, `unused_must_use`, `clippy::todo`, etc.) are
  # already `deny` in the workspace lints.

permissions:
  contents: write
  id-token: write

# =============================================================================
# Tier 1 — CI (runs on every push and PR)
# =============================================================================

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude rusty-bacnet --exclude bacnet-wasm --all-targets --locked

  wasm-check:
    name: WASM Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p bacnet-wasm --target wasm32-unknown-unknown --locked

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: advisory-db-${{ runner.os }}-
      - run: cargo audit --color always

  file-size-cap:
    name: File-size cap (700 LOC)
    runs-on: ubuntu-latest
    env:
      CHECK_FILE_SIZE_WARN: "1"
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-file-size.sh

  no-secret-scan:
    name: No-secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-no-secrets.sh

  msrv:
    name: MSRV (1.93)
    runs-on: ubuntu-latest
    env:
      # Override `rust-toolchain.toml` (which pins the dev/CI channel to
      # 1.95.0) so this job exercises the documented MSRV from the
      # workspace `Cargo.toml`.
      RUSTUP_TOOLCHAIN: "1.93"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace --exclude rusty-bacnet --exclude bacnet-wasm --locked

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full feature set (serial + ethernet are Linux-only deps)
          - os: ubuntu-latest
            features: "--features bacnet-transport/ipv6,bacnet-transport/sc-tls,bacnet-transport/serial,bacnet-transport/ethernet"
          # macOS: ipv6 + sc-tls only
          - os: macos-latest
            features: "--features bacnet-transport/ipv6,bacnet-transport/sc-tls"
          # Windows: ipv6 + sc-tls only
          - os: windows-latest
            features: "--features bacnet-transport/ipv6,bacnet-transport/sc-tls"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo test --workspace --exclude rusty-bacnet --exclude bacnet-wasm --locked ${{ matrix.features }}

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ===========================================================================
  # Tier 2 — Release (only on v* tags, after all CI passes)
  # ===========================================================================

  validate:
    name: Validate Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fmt, clippy, test, deny, wasm-check, audit, no-secret-scan]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for version $VERSION"
            exit 1
          fi

  publish-crates:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2

      - name: Publish bacnet-types
        run: cargo publish -p bacnet-types --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-encoding
        run: cargo publish -p bacnet-encoding --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-services
        run: cargo publish -p bacnet-services --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-transport
        run: cargo publish -p bacnet-transport --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-network
        run: cargo publish -p bacnet-network --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-objects
        run: cargo publish -p bacnet-objects --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-server
        run: cargo publish -p bacnet-server --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish bacnet-client
        run: cargo publish -p bacnet-client --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-wheels:
    name: Wheels (${{ matrix.os }} ${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/rusty-bacnet/Cargo.toml -i 3.11 3.12 3.13
          manylinux: auto
          sccache: true
          before-script-linux: |
            if command -v yum &> /dev/null; then
              yum install -y perl-IPC-Cmd cmake3 || true
              ln -sf /usr/bin/cmake3 /usr/local/bin/cmake || true
            elif command -v apk &> /dev/null; then
              apk add --no-cache cmake perl make
            fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  build-sdist:
    name: Build sdist
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/rusty-bacnet/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  build-wasm:
    name: Build WASM
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build (bundler target)
        run: wasm-pack build crates/bacnet-wasm --target bundler --out-dir ../../dist/wasm-npm

      - name: Build (web target)
        run: wasm-pack build crates/bacnet-wasm --target web --out-dir ../../dist/wasm-web

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-npm
          path: dist/wasm-npm

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-web
          path: dist/wasm-web

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wasm]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wasm-npm
          path: dist/wasm-npm

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: cd dist/wasm-npm && npm publish --provenance --access public

  github-release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-crates, publish-pypi, publish-npm, build-cli-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist/cli
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cli/bacnet-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Tier 2c — CLI binary distribution
  # ===========================================================================

  build-cli-binaries:
    name: CLI Binary (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: bacnet-linux-amd64
            features: "pcap,sc-tls"
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: bacnet-linux-arm64
            features: "pcap,sc-tls"
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: bacnet-macos-amd64
            features: "sc-tls"
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: bacnet-macos-arm64
            features: "sc-tls"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: bacnet-windows-amd64.exe
            features: "sc-tls"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build CLI
        run: cargo build --release -p bacnet-cli --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/bacnet"
          if [ "${{ runner.os }}" = "Windows" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.binary }}"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ matrix.binary }}

  # ===========================================================================
  # Docker Hub (placeholder for 1.0)
  # ===========================================================================
  # TODO: Add multi-arch Docker builds for:
  #   - bacnet-device (BIP/SC server)
  #   - bacnet-router (multi-port router)
  #   - bacnet-bbmd (broadcast management)
  #   - bacnet-sc-hub (SC hub relay)
  # Target: linux/amd64 + linux/arm64 via docker/build-push-action
